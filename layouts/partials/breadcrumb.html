{{ if and .IsPage (not .IsHome) }}
{{ $postsPage := site.GetPage "/posts" }}
<nav aria-label="breadcrumb" class="breadcrumb-nav" style="margin-bottom: 1rem; font-size: 0.85rem; color: var(--text-muted, #6b7280);">
  <ol class="breadcrumb-list" itemscope itemtype="https://schema.org/BreadcrumbList" style="list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 0.25rem;">
    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" style="display: flex; align-items: center; gap: 0.25rem;">
      <a href="{{ "/" | relLangURL }}" itemprop="item" style="color: var(--primary-color, #BD5FFF); text-decoration: none;"><span itemprop="name">{{ i18n "home" | default "Home" }}</span></a>
      <meta itemprop="position" content="1" />
      <span aria-hidden="true" style="color: var(--text-muted, #6b7280);">›</span>
    </li>
    {{ with $postsPage }}
    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" style="display: flex; align-items: center; gap: 0.25rem;">
      <a href="{{ .RelPermalink }}" itemprop="item" style="color: var(--primary-color, #BD5FFF); text-decoration: none;"><span itemprop="name">{{ i18n "posts" | default "Posts" }}</span></a>
      <meta itemprop="position" content="2" />
      <span aria-hidden="true" style="color: var(--text-muted, #6b7280);">›</span>
    </li>
    {{ end }}
    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <span itemprop="name" style="color: var(--text-muted, #6b7280);">{{ .Title }}</span>
      <meta itemprop="position" content="{{ if $postsPage }}3{{ else }}2{{ end }}" />
    </li>
  </ol>
</nav>
{{ end }}
